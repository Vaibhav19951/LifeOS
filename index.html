<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="container">

    <h1>🌟 LifeOS</h1>
    <p class="welcome">Welcome Back, Vaibhav 👋</p>

    <div class="cards">

        <div class="card">
            <h2>⚖ Weight</h2>
            <p>53 kg</p>
        </div>

        <div class="card">
            <h2>💧 Water</h2>
            <p>2 / 4 L</p>
        </div>

        <div class="card">
            <h2>😴 Sleep</h2>
            <p>7 Hours</p>
        </div>

        <div class="card">
            <h2>🏋 Gym</h2>
            <p>Completed ✅</p>
        </div>

        <div class="card">
            <h2>😊 Mood</h2>
            <p>8 / 10</p>
        </div>

        <div class="card">
            <h2>🔥 Streak</h2>
            <p>12 Days</p>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
